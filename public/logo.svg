<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1082 610" role="img" aria-label="ZEROGRA RA ALLIANCE">
  <defs>
    <linearGradient id="raGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c2ff"/>
      <stop offset="40%" stop-color="#2bb5a0"/>
      <stop offset="100%" stop-color="#3ecf8e"/>
    </linearGradient>
  </defs>

  <g font-family="'Inter', 'Noto Sans JP', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
     font-weight="900"
     letter-spacing="-4"
     text-anchor="middle">

    <!-- Line 1: ZEROG (white) + RA (gradient). Black text adapted to white for dark theme. -->
    <text x="541" y="245" font-size="200" fill="#ffffff">
      <tspan>ZEROG</tspan><tspan fill="url(#raGradient)">RA</tspan>
    </text>

    <!-- Line 2: RA (gradient) + ALLIANCE (white) -->
    <text x="541" y="475" font-size="200" fill="#ffffff">
      <tspan fill="url(#raGradient)">RA</tspan><tspan> ALLIANCE</tspan>
    </text>
  </g>
</svg>
