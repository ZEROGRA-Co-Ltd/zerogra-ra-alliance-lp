<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1500" role="img" aria-label="ZEROGRA RA ALLIANCE">
  <defs>
    <linearGradient id="raGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c2ff"/>
      <stop offset="40%" stop-color="#2bb5a0"/>
      <stop offset="100%" stop-color="#3ecf8e"/>
    </linearGradient>
  </defs>

  <g font-family="'Inter', 'Noto Sans JP', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
     font-weight="900"
     font-size="270"
     letter-spacing="-6"
     text-anchor="middle"
     dominant-baseline="middle">

    <!-- Line 1: ZEROG + RA(gradient). Black text adapted to white for dark theme. -->
    <text x="750" y="640" fill="#ffffff">
      <tspan>ZEROG</tspan><tspan fill="url(#raGradient)">RA</tspan>
    </text>

    <!-- Line 2: RA(gradient) + ALLIANCE -->
    <text x="750" y="940" fill="#ffffff">
      <tspan fill="url(#raGradient)">RA</tspan><tspan> ALLIANCE</tspan>
    </text>
  </g>
</svg>
